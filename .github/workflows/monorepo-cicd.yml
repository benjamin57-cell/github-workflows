name: Monorepo Build

on:
  workflow_call:
    inputs:
      services:
        description: 'JSON array of service directory names, e.g. ["backend","frontend"]'
        type: string
        required: true
      registry:
        description: "Registry type: dockerhub | ghcr"
        type: string
        required: false
        default: dockerhub
      registry-namespace:
        description: "Image namespace/owner (default: github.repository_owner)"
        type: string
        required: false
        default: ""
      image-tag:
        description: "Image tag (default: {branch}-{short-sha})"
        type: string
        required: false
        default: ""
      platforms:
        description: "Target platforms, e.g. linux/amd64,linux/arm64"
        type: string
        required: false
        default: linux/amd64
      cache:
        description: "Enable Docker layer cache via registry"
        type: boolean
        required: false
        default: true
      runner:
        description: "GitHub Actions runner label"
        type: string
        required: false
        default: ubuntu-latest
    secrets:
      registry-username:
        description: "Registry username (DockerHub/Custom)"
        required: false
      registry-password:
        description: "Registry password or token"
        required: false

jobs:
  # ──────────────────────────────────────────────
  # Detect which services changed
  # ──────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.detect.outputs.changes }}
      has-changes: ${{ steps.detect.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v6

      - name: Build filter config
        id: filters
        env:
          SERVICES: ${{ inputs.services }}
        run: |
          FILTER=$(echo "${SERVICES}" | jq -r '.[] | "\(.): \n  - '\''\(.)/**'\''"' | sed 's/\\n/\n/g')
          {
            echo "filters<<EOF"
            echo "${FILTER}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: ${{ steps.filters.outputs.filters }}

      - name: Collect changes
        id: detect
        env:
          SERVICES: ${{ inputs.services }}
          FILTER_OUTPUT: ${{ toJSON(steps.filter.outputs) }}
        run: |
          CHANGES=$(echo "${SERVICES}" | jq -c --argjson out "${FILTER_OUTPUT}" \
            '[.[] | select(. as $p | $out[$p] == "true")]')
          echo "changes=${CHANGES}" >> "$GITHUB_OUTPUT"
          [[ "${CHANGES}" != "[]" ]] && echo "has-changes=true" >> "$GITHUB_OUTPUT" || echo "has-changes=false" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # Build & push each changed service
  # ──────────────────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.changes) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # ── Login: DockerHub ──
      - name: Login to Docker Hub
        if: inputs.registry == 'dockerhub'
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.registry-username }}
          password: ${{ secrets.registry-password }}

      # ── Login: GHCR ──
      - name: Login to GHCR
        if: inputs.registry == 'ghcr'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.registry-password }}

      # ── Metadata ──
      - name: Prepare image metadata
        id: meta
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          SERVICE: ${{ matrix.service }}
          REGISTRY: ${{ inputs.registry }}
          NAMESPACE: ${{ inputs.registry-namespace }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: |
          IMAGE_NAME="${REPO_NAME}-${SERVICE}"
          NS="${NAMESPACE:-${GITHUB_OWNER}}"
          TAG="${IMAGE_TAG:-${{ github.ref_name }}-${GITHUB_SHA:0:8}}"

          case "${REGISTRY}" in
            dockerhub) IMAGE="docker.io/${NS}/${IMAGE_NAME}" ;;
            ghcr)      IMAGE="ghcr.io/${NS}/${IMAGE_NAME}" ;;
            *)         echo "::error::Unsupported registry: ${REGISTRY}"; exit 1 ;;
          esac

          echo "image=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "cache-ref=${IMAGE}:buildcache" >> "$GITHUB_OUTPUT"

      # ── Buildx / QEMU ──
      - name: Set up QEMU
        if: inputs.platforms != 'linux/amd64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── Build & Push ──
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.service }}
          file: ${{ matrix.service }}/Dockerfile
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.image }}
          provenance: false
          cache-from: ${{ inputs.cache && format('type=registry,ref={0}', steps.meta.outputs.cache-ref) || '' }}
          cache-to: ${{ inputs.cache && format('type=registry,ref={0},mode=max', steps.meta.outputs.cache-ref) || '' }}
