name: Monorepo Build

on:
  workflow_call:
    inputs:
      services:
        description: 'JSON array of service directory names, e.g. ["backend","frontend"]'
        type: string
        required: true
      # ── Registry ──
      registry:
        description: "Registry type: ecr | gar | ghcr | dockerhub | custom"
        type: string
        required: false
        default: dockerhub
      registry-url:
        description: "Registry hostname (required for gar & custom, e.g. asia-southeast1-docker.pkg.dev)"
        type: string
        required: false
        default: ""
      registry-namespace:
        description: "Image namespace/owner (default: github.repository_owner)"
        type: string
        required: false
        default: ""
      # ── Image ──
      image-tag:
        description: "Image tag (default: {branch}-{short-sha})"
        type: string
        required: false
        default: ""
      # ── Build ──
      push:
        description: "Push image to registry"
        type: boolean
        required: false
        default: true
      branch-or-tag:
        description: "Git ref to checkout"
        type: string
        required: false
        default: ${{ github.ref_name }}
      platforms:
        description: "Target platforms, e.g. linux/amd64,linux/arm64"
        type: string
        required: false
        default: linux/amd64
      build-args:
        description: "Newline-separated build args"
        type: string
        required: false
        default: ""
      # ── Cache ──
      cache:
        description: "Enable Docker layer cache via registry"
        type: boolean
        required: false
        default: true
      cache-mode:
        description: "Cache mode: min (fast, smaller) or max (all layers)"
        type: string
        required: false
        default: min
      # ── Runner ──
      runner:
        description: "GitHub Actions runner label"
        type: string
        required: false
        default: ubuntu-latest
      # ── ECR-specific ──
      aws-region:
        description: "AWS region (ECR only)"
        type: string
        required: false
        default: ap-southeast-1

jobs:
  # ──────────────────────────────────────────────
  # Detect which services changed
  # ──────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      changes: ${{ steps.detect.outputs.changes }}
      has-changes: ${{ steps.detect.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v6

      - name: Build filter config
        id: filters
        env:
          SERVICES: ${{ inputs.services }}
        run: |
          FILTER=$(echo "${SERVICES}" | jq -r '.[] | "\(.): \n  - '\''\(.)/**'\''"' | sed 's/\\n/\n/g')
          {
            echo "filters<<EOF"
            echo "${FILTER}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: ${{ steps.filters.outputs.filters }}

      - name: Collect changes
        id: detect
        env:
          SERVICES: ${{ inputs.services }}
          FILTER_OUTPUT: ${{ toJSON(steps.filter.outputs) }}
        run: |
          CHANGES=$(echo "${SERVICES}" | jq -c --argjson out "${FILTER_OUTPUT}" \
            '[.[] | select(. as $p | $out[$p] == "true")]')
          echo "changes=${CHANGES}" >> "$GITHUB_OUTPUT"
          [[ "${CHANGES}" != "[]" ]] && echo "has-changes=true" >> "$GITHUB_OUTPUT" || echo "has-changes=false" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────
  # Build & push each changed service
  # ──────────────────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    runs-on: ${{ inputs.runner }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.changes) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch-or-tag }}

      # ── Login: Amazon ECR ──
      - name: Configure AWS Credentials
        if: inputs.registry == 'ecr'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        if: inputs.registry == 'ecr'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Login: Google Artifact Registry ──
      - name: Login to Google Artifact Registry
        if: inputs.registry == 'gar'
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry-url }}
          username: _json_key
          password: ${{ secrets.GCP_CREDENTIALS }}

      # ── Login: GHCR / DockerHub / Custom ──
      - name: Login to container registry
        if: inputs.registry == 'ghcr' || inputs.registry == 'dockerhub' || inputs.registry == 'custom'
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry == 'ghcr' && 'ghcr.io' || inputs.registry == 'dockerhub' && 'docker.io' || inputs.registry-url }}
          username: ${{ inputs.registry == 'ghcr' && github.actor || secrets.REGISTRY_USERNAME }}
          password: ${{ inputs.registry == 'ghcr' && secrets.GITHUB_TOKEN || secrets.REGISTRY_PASSWORD }}

      # ── Metadata ──
      - name: Prepare image metadata
        id: meta
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          SERVICE: ${{ matrix.service }}
          REGISTRY_TYPE: ${{ inputs.registry }}
          REGISTRY_URL: ${{ inputs.registry-url }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          NAMESPACE: ${{ inputs.registry-namespace }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          IMAGE_TAG: ${{ inputs.image-tag }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GIT_REF: ${{ github.ref_name }}
        run: |
          IMAGE_NAME="${REPO_NAME}-${SERVICE}"
          NS="${NAMESPACE:-${REGISTRY_USERNAME:-${GITHUB_OWNER}}}"
          TAG="${IMAGE_TAG:-${GIT_REF}-${GITHUB_SHA:0:8}}"

          case "${REGISTRY_TYPE}" in
            ecr)        IMAGE="${ECR_REGISTRY}/${IMAGE_NAME}" ;;
            gar|custom) IMAGE="${REGISTRY_URL}/${NS}/${IMAGE_NAME}" ;;
            ghcr)       IMAGE="ghcr.io/${NS}/${IMAGE_NAME}" ;;
            dockerhub)  IMAGE="docker.io/${NS}/${IMAGE_NAME}" ;;
            *)          echo "::error::Unknown registry type: ${REGISTRY_TYPE}"; exit 1 ;;
          esac

          echo "image-uri=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "cache-ref=${IMAGE}:buildcache" >> "$GITHUB_OUTPUT"

      - name: Docker meta (labels)
        id: dockermeta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.meta.outputs.image }}

      # ── Buildx / QEMU ──
      - name: Set up QEMU
        if: inputs.platforms != 'linux/amd64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── Build & Push ──
      - name: Build and Push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.service }}
          file: ${{ matrix.service }}/Dockerfile
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.image-uri }}
          labels: ${{ steps.dockermeta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          secrets: ${{ secrets.BUILD_SECRETS }}
          provenance: false
          cache-from: ${{ inputs.cache && format('type=registry,ref={0}', steps.meta.outputs.cache-ref) || '' }}
          cache-to: ${{ inputs.cache && format('type=registry,ref={0},mode={1}', steps.meta.outputs.cache-ref, inputs.cache-mode) || '' }}

# TODO: Add optional step to update GitOps repo with new image tag (similar to push-gitops.yml)