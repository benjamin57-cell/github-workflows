name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      image-name:
        description: "Docker image name, e.g. account-service"
        type: string
        required: true
      image-tag:
        description: "Image tag (default: branch/tag name)"
        type: string
        required: false
        default: ${{ github.ref_name }}
      push:
        description: "Push image to registry"
        type: boolean
        required: false
        default: true
      context:
        description: "Docker build context path"
        type: string
        required: false
        default: .
      dockerfile:
        description: "Dockerfile path relative to context"
        type: string
        required: false
        default: Dockerfile
      branch-or-tag:
        description: "Git ref to checkout"
        type: string
        required: false
        default: ${{ github.ref_name }}
      platforms:
        description: "Target platforms, e.g. linux/amd64,linux/arm64"
        type: string
        required: false
        default: linux/amd64
      build-args:
        description: "Newline-separated build args, e.g. ARG1=val1"
        type: string
        required: false
        default: ""
      cache:
        description: "Enable Docker layer cache via registry"
        type: boolean
        required: false
        default: true
      cache-mode:
        description: "Cache mode: min (fast, smaller) or max (all layers)"
        type: string
        required: false
        default: min
      runner:
        description: "GitHub Actions runner label"
        type: string
        required: false
        default: ubuntu-latest
      aws-region:
        description: "AWS region for ECR"
        type: string
        required: false
        default: ap-southeast-1
    secrets:
      aws-access-key-id:
        description: "AWS access key ID"
        required: true
      aws-secret-access-key:
        description: "AWS secret access key"
        required: true
      build-secrets:
        description: "Newline-separated secret build args, e.g. GH_TOKEN=xxx"
        required: false
    outputs:
      image-uri:
        description: "Full image URI with tag"
        value: ${{ jobs.docker-build-and-push.outputs.image-uri }}
      image-digest:
        description: "Image digest (sha256)"
        value: ${{ jobs.docker-build-and-push.outputs.image-digest }}

jobs:
  docker-build-and-push:
    name: Build and Push
    runs-on: ${{ inputs.runner }}
    outputs:
      image-uri: ${{ steps.meta.outputs.image-uri }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.branch-or-tag }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Prepare metadata
        id: meta
        run: |
          IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ inputs.image-name }}"
          TAG="${{ inputs.image-tag }}"
          echo "image-uri=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Docker meta (labels)
        id: dockermeta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.meta.outputs.image }}

      - name: Set up QEMU
        if: inputs.platforms != 'linux/amd64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.image-uri }}
          labels: ${{ steps.dockermeta.outputs.labels }}
          cache-from: ${{ inputs.cache && format('type=registry,ref={0}:dockercache', steps.meta.outputs.image) || '' }}
          cache-to: ${{ inputs.cache && format('type=registry,ref={0}:dockercache,mode={1},image-manifest=true', steps.meta.outputs.image, inputs.cache-mode) || '' }}
          build-args: ${{ inputs.build-args }}
          secrets: ${{ secrets.build-secrets }}
          provenance: false
