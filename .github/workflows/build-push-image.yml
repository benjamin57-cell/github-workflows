name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      # ── Registry ──
      registry:
        description: "Registry type: ecr | gar | ghcr | dockerhub | custom"
        type: string
        required: false
        default: ecr
      registry-url:
        description: "Registry hostname (required for gar & custom, e.g. asia-southeast1-docker.pkg.dev)"
        type: string
        required: false
        default: ""
      # ── Image ──
      image-name:
        description: "Image path within registry (ECR: repo-name, GAR: project/repo/name, GHCR: org/name)"
        type: string
        required: true
      image-tag:
        description: "Image tag (default: branch/tag name)"
        type: string
        required: false
        default: ${{ github.ref_name }}
      # ── Build ──
      push:
        description: "Push image to registry"
        type: boolean
        required: false
        default: true
      context:
        description: "Docker build context path"
        type: string
        required: false
        default: .
      dockerfile:
        description: "Dockerfile path relative to context"
        type: string
        required: false
        default: Dockerfile
      branch-or-tag:
        description: "Git ref to checkout"
        type: string
        required: false
        default: ${{ github.ref_name }}
      platforms:
        description: "Target platforms, e.g. linux/amd64,linux/arm64"
        type: string
        required: false
        default: linux/amd64
      build-args:
        description: "Newline-separated build args"
        type: string
        required: false
        default: ""
      # ── Cache ──
      cache:
        description: "Enable Docker layer cache via registry"
        type: boolean
        required: false
        default: true
      cache-mode:
        description: "Cache mode: min (fast, smaller) or max (all layers)"
        type: string
        required: false
        default: min
      # ── Runner ──
      runner:
        description: "GitHub Actions runner label"
        type: string
        required: false
        default: ubuntu-latest
      # ── ECR-specific ──
      aws-region:
        description: "AWS region (ECR only)"
        type: string
        required: false
        default: ap-southeast-1
    secrets:
      # ECR
      aws-access-key-id:
        description: "AWS access key ID (ECR)"
        required: false
      aws-secret-access-key:
        description: "AWS secret access key (ECR)"
        required: false
      # GAR
      gcp-credentials:
        description: "GCP service account JSON key (GAR)"
        required: false
      # GHCR / DockerHub / Custom
      registry-username:
        description: "Registry username (GHCR/DockerHub/Custom)"
        required: false
      registry-password:
        description: "Registry password or token (GHCR/DockerHub/Custom)"
        required: false
      # Build
      build-secrets:
        description: "Newline-separated secret build args"
        required: false
    outputs:
      image-uri:
        description: "Full image URI with tag"
        value: ${{ jobs.docker-build-and-push.outputs.image-uri }}
      image-digest:
        description: "Image digest (sha256)"
        value: ${{ jobs.docker-build-and-push.outputs.image-digest }}

jobs:
  docker-build-and-push:
    name: Build and Push
    runs-on: ${{ inputs.runner }}
    outputs:
      image-uri: ${{ steps.meta.outputs.image-uri }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch-or-tag }}

      # ── Login: Amazon ECR ──
      - name: Configure AWS Credentials
        if: inputs.registry == 'ecr'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.aws-access-key-id }}
          aws-secret-access-key: ${{ secrets.aws-secret-access-key }}
          aws-region: ${{ inputs.aws-region }}

      - name: Login to Amazon ECR
        if: inputs.registry == 'ecr'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Login: Google Artifact Registry ──
      - name: Login to Google Artifact Registry
        if: inputs.registry == 'gar'
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry-url }}
          username: _json_key
          password: ${{ secrets.gcp-credentials }}

      # ── Login: GHCR / DockerHub / Custom ──
      - name: Login to container registry
        if: inputs.registry == 'ghcr' || inputs.registry == 'dockerhub' || inputs.registry == 'custom'
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry == 'ghcr' && 'ghcr.io' || inputs.registry == 'dockerhub' && 'docker.io' || inputs.registry-url }}
          username: ${{ secrets.registry-username }}
          password: ${{ secrets.registry-password }}

      # ── Metadata ──
      - name: Prepare metadata
        id: meta
        env:
          REGISTRY_TYPE: ${{ inputs.registry }}
          REGISTRY_URL: ${{ inputs.registry-url }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_NAME: ${{ inputs.image-name }}
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          case "${REGISTRY_TYPE}" in
            ecr)        IMAGE="${ECR_REGISTRY}/${IMAGE_NAME}" ;;
            gar|custom)  IMAGE="${REGISTRY_URL}/${IMAGE_NAME}" ;;
            ghcr)       IMAGE="ghcr.io/${IMAGE_NAME}" ;;
            dockerhub)  IMAGE="docker.io/${IMAGE_NAME}" ;;
            *)          echo "::error::Unknown registry type: ${REGISTRY_TYPE}"; exit 1 ;;
          esac
          echo "image-uri=${IMAGE}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Docker meta (labels)
        id: dockermeta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.meta.outputs.image }}

      - name: Set up QEMU
        if: inputs.platforms != 'linux/amd64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── Build & Push ──
      - name: Build and Push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.image-uri }}
          labels: ${{ steps.dockermeta.outputs.labels }}
          cache-from: ${{ inputs.cache && format('type=registry,ref={0}:buildcache', steps.meta.outputs.image) || '' }}
          cache-to: ${{ inputs.cache && format('type=registry,ref={0}:buildcache,mode={1},image-manifest=true', steps.meta.outputs.image, inputs.cache-mode) || '' }}
          build-args: ${{ inputs.build-args }}
          secrets: ${{ secrets.build-secrets }}
          provenance: false
